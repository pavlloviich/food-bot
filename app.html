<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Дневник питания</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0e0f12;
    --surface: #16181f;
    --surface2: #1e2029;
    --border: #2a2d3a;
    --accent: #7cffa4;
    --accent2: #4ef0ff;
    --danger: #ff5f5f;
    --text: #f0f2f8;
    --muted: #6b7080;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    padding: 20px 20px 0;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .date-label { font-size: 13px; color: var(--muted); }

  .period-tabs {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 16px;
    scrollbar-width: none;
  }
  .period-tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 700;
  }

  .summary-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    padding: 0 20px 16px;
  }

  .summary-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .summary-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .card-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }

  .card-value {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }

  .card-unit { font-size: 11px; color: var(--muted); }

  .card-bar {
    height: 3px;
    background: var(--border);
    border-radius: 3px;
    margin-top: 8px;
    overflow: hidden;
  }

  .card-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s ease;
  }

  /* ── Tabs (Еда / Вода) ── */
  .section-tabs {
    display: flex;
    gap: 0;
    padding: 0 20px 16px;
  }

  .section-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid var(--border);
    color: var(--muted);
    transition: all 0.2s;
  }

  .section-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    font-weight: 700;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px 12px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
  }

  .add-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
  }

  .meals-list {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .meal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .meal-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .meal-info { flex: 1; min-width: 0; }

  .meal-name {
    font-weight: 500;
    font-size: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .meal-meta { font-size: 12px; color: var(--muted); }

  .meal-cal {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--accent);
    flex-shrink: 0;
  }

  .meal-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .icon-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    transition: all 0.2s;
  }

  .icon-btn:active { transform: scale(0.9); }
  .icon-btn.edit:active { background: var(--accent2); border-color: var(--accent2); color: #000; }
  .icon-btn.del:active  { background: var(--danger);  border-color: var(--danger);  color: white; }

  /* ── Water list ── */
  .water-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: slideIn 0.3s ease;
  }

  .water-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: rgba(78, 240, 255, 0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .water-info { flex: 1; }
  .water-ml {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--accent2);
  }

  .day-group { margin-bottom: 20px; }

  .day-header {
    padding: 0 20px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .day-date {
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
  }

  .day-total { font-size: 13px; font-weight: 500; color: var(--accent); }

  .empty {
    padding: 60px 20px;
    text-align: center;
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; }

  .empty-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .empty-sub { color: var(--muted); font-size: 14px; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border-radius: 24px 24px 0 0;
    padding: 24px 20px 40px;
    width: 100%;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    border-top: 1px solid var(--border);
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
    text-align: center;
  }

  .form-group { margin-bottom: 14px; }

  .form-label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-input {
    width: 100%;
    padding: 12px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    font-family: 'Syne', sans-serif;
  }

  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 16px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .pb { padding-bottom: 100px; }

  /* ── Weight chart ── */
  .weight-section {
    padding: 0 20px 20px;
  }
  .weight-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .weight-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
  }
  .weight-add-btn {
    padding: 6px 14px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .weight-chart {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .weight-chart svg { width: 100%; display: block; }
  .weight-log-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .weight-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .weight-entry-date { font-size: 13px; color: var(--muted); }
  .weight-entry-val {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--accent);
  }
  .weight-entry-diff {
    font-size: 12px;
    margin-left: 6px;
  }
  .weight-entry-diff.up   { color: var(--danger); }
  .weight-entry-diff.down { color: var(--accent); }


  /* ── Profile button ── */
  .profile-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .profile-btn:active { background: var(--surface2); transform: scale(0.95); }

  /* ── Profile modal ── */
  .profile-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .profile-row:last-child { border-bottom: none; }
  .profile-row-label { font-size: 14px; color: var(--muted); }
  .profile-row-value {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--text);
  }
  .profile-row-value.editable {
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline dotted;
  }
  .goal-btns {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 8px;
  }
  .goal-btn {
    padding: 10px 6px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
  }
  .goal-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(124,255,164,0.1);
  }

</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">Дневник питания</div>
    <div style="display:flex;align-items:center;gap:8px"><div class="date-label" id="dateLabel"></div><button class="profile-btn" id="remindersBtn" title="Напоминания">🔔</button><button class="profile-btn" id="profileBtn" title="Профиль">👤</button></div>
  </div>
  <div class="period-tabs">
    <div class="tab active" data-period="today">Сегодня</div>
    <div class="tab" data-period="week">7 дней</div>
    <div class="tab" data-period="month">30 дней</div>
    <div class="tab" data-period="custom">Выбрать</div>
  </div>
</div>

<div id="summaryRow" class="summary-row"></div>

<div class="section-tabs">
  <div class="section-tab active" data-section="meals">🍽 Еда</div>
  <div class="section-tab" data-section="water">💧 Вода</div>
</div>

<div class="section-header">
  <div class="section-title" id="sectionTitle">Дневник</div>
  <button class="add-btn" id="addBtn">+ Добавить</button>
</div>

<div id="content"></div>
<div class="weight-section pb" id="weightSection" style="display:none">
  <div class="weight-header" style="margin-bottom:16px">
    <button onclick="closeWeightSection()" style="background:none;border:none;color:var(--accent);font-size:14px;font-weight:700;cursor:pointer;padding:0">← Назад</button>
    <button class="weight-add-btn" onclick="addWeightEntry()">+ Записать</button>
  </div>
  <div class="weight-header">
    <div class="weight-title">⚖️ Динамика веса</div>
  </div>
  <div class="weight-chart" id="weightChart"></div>
  <div class="weight-log-list" id="weightLog"></div>
</div>

<!-- Meal modal -->
<div class="modal-overlay" id="mealModal">
  <div class="modal">
    <div class="modal-title" id="mealModalTitle">Добавить блюдо</div>
    <input type="hidden" id="editMealId">
    <div class="form-group">
      <label class="form-label">Название блюда</label>
      <input type="text" class="form-input" id="foodName" placeholder="Например: гречка с курицей">
    </div>
    <div class="form-group">
      <label class="form-label">Калории</label>
      <input type="number" class="form-input" id="foodCal" placeholder="350">
    </div>
    <div class="form-group">
      <label class="form-label">БЖУ (г)</label>
      <div class="form-row">
        <input type="number" class="form-input" id="foodP" placeholder="Белки">
        <input type="number" class="form-input" id="foodF" placeholder="Жиры">
        <input type="number" class="form-input" id="foodC" placeholder="Углев">
      </div>
    </div>
    <button class="submit-btn" id="mealSubmitBtn">Сохранить</button>
  </div>
</div>

<!-- Water modal -->
<div class="modal-overlay" id="waterModal">
  <div class="modal">
    <div class="modal-title">Добавить воду</div>
    <div class="form-group">
      <label class="form-label">Количество (мл)</label>
      <input type="number" class="form-input" id="waterMl" placeholder="250">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      <button class="submit-btn" style="margin:0;font-size:13px;padding:10px" onclick="setWaterMl(250)">Стакан<br>250мл</button>
      <button class="submit-btn" style="margin:0;font-size:13px;padding:10px" onclick="setWaterMl(330)">Банка<br>330мл</button>
      <button class="submit-btn" style="margin:0;font-size:13px;padding:10px" onclick="setWaterMl(500)">Бутылка<br>500мл</button>
    </div>
    <button class="submit-btn" id="waterSubmitBtn">Сохранить</button>
  </div>
</div>


<!-- Profile modal -->
<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <div class="modal-title">Профиль</div>

    <div class="profile-row">
      <div class="profile-row-label">Telegram ID</div>
      <div class="profile-row-value" id="profileUserId">—</div>
    </div>

    <div class="profile-row">
      <div class="profile-row-label">Пол</div>
      <div class="profile-row-value" id="profileGender">—</div>
    </div>

    <div class="profile-row">
      <div class="profile-row-label">Возраст</div>
      <div class="profile-row-value" id="profileAge">—</div>
    </div>

    <div class="profile-row">
      <div class="profile-row-label">Вес</div>
      <div class="profile-row-value" id="profileWeight">—</div>
    </div>

    <div class="profile-row">
      <div class="profile-row-label">Рост</div>
      <div class="profile-row-value" id="profileHeight">—</div>
    </div>

    <div class="profile-row">
      <div class="profile-row-label">Активность</div>
      <div class="profile-row-value" id="profileActivity">—</div>
    </div>

    <div class="profile-row">
      <div class="profile-row-label">Цель</div>
      <div class="profile-row-value" id="profileGoal">—</div>
    </div>

    <div class="profile-row">
      <div class="profile-row-label">Калории</div>
      <div class="profile-row-value" id="profileCaloriesGoal">—</div>
    </div>

    <div class="profile-row">
      <div class="profile-row-label">Дефицит</div>
      <div class="profile-row-value" id="profileCaloriesDeficit">—</div>
    </div>

    <div class="profile-row">
      <div class="profile-row-label">Поддержание</div>
      <div class="profile-row-value" id="profileCaloriesMaintenance">—</div>
    </div>

    <div class="profile-row">
      <div class="profile-row-label">Вода</div>
      <div class="profile-row-value" id="profileWaterGoal">—</div>
    </div>

    <button class="submit-btn" id="profileCloseBtn">Закрыть</button>
  </div>
</div>

<!-- Reminders modal -->
<div class="modal-overlay" id="remindersModal">
  <div class="modal">
    <div class="modal-title">Напоминания</div>

    <div class="profile-row">
      <div class="profile-row-label">Завтрак</div>
      <div style="display:flex;gap:10px;align-items:center;">
        <input type="time" class="form-input" id="remBreakfastTime" style="width:120px;padding:10px 12px;">
        <input type="checkbox" id="remBreakfastOn">
      </div>
    </div>

    <div class="profile-row">
      <div class="profile-row-label">Обед</div>
      <div style="display:flex;gap:10px;align-items:center;">
        <input type="time" class="form-input" id="remLunchTime" style="width:120px;padding:10px 12px;">
        <input type="checkbox" id="remLunchOn">
      </div>
    </div>

    <div class="profile-row">
      <div class="profile-row-label">Ужин</div>
      <div style="display:flex;gap:10px;align-items:center;">
        <input type="time" class="form-input" id="remDinnerTime" style="width:120px;padding:10px 12px;">
        <input type="checkbox" id="remDinnerOn">
      </div>
    </div>

    <div class="profile-row">
      <div class="profile-row-label">Вода</div>
      <div style="display:flex;gap:10px;align-items:center;">
        <input type="checkbox" id="remWaterOn">
      </div>
    </div>

    <div id="remWaterIntervalRow" style="display:none;margin-top:14px;">
      <label class="form-label">Интервал напоминаний о воде</label>
      <div class="goal-btns">
        <button type="button" class="goal-btn" data-interval="1" onclick="setWaterInterval(1)">1 час</button>
        <button type="button" class="goal-btn" data-interval="2" onclick="setWaterInterval(2)">2 часа</button>
        <button type="button" class="goal-btn" data-interval="3" onclick="setWaterInterval(3)">3 часа</button>
      </div>
    </div>

    <button class="submit-btn" id="remindersSaveBtn">Сохранить</button>
  </div>
</div>


<script>
const SUPABASE_URL = 'https://ecomaxacsgdreayvyfnz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Avhoql7DMWlCV8JMjnhKjA_yjKecgKI';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#0e0f12'); tg.setBackgroundColor('#0e0f12'); }

const userId = tg?.initDataUnsafe?.user?.id || null;

let currentPeriod  = 'today';
let currentSection = 'meals';
let userSettings   = null;
let customStart    = null;
let customEnd      = null;

function today()    { return new Date().toISOString().split('T')[0]; }
function daysAgo(n) { const d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().split('T')[0]; }
function fmtDate(s) { return new Date(s+'T00:00:00').toLocaleDateString('ru',{day:'numeric',month:'short'}); }

function getPeriodDates() {
  const t = today();
  if (currentPeriod==='today')  return {start:t,end:t};
  if (currentPeriod==='week')   return {start:daysAgo(6),end:t};
  if (currentPeriod==='month')  return {start:daysAgo(29),end:t};
  if (currentPeriod==='custom') return {start:customStart||t,end:customEnd||t};
  return {start:t,end:t};
}

function foodEmoji(name) {
  const n = name.toLowerCase();
  if (n.includes('кофе')||n.includes('чай')) return '☕';
  if (n.includes('яйц')) return '🥚';
  if (n.includes('салат')) return '🥗';
  if (n.includes('суп')||n.includes('борщ')) return '🍲';
  if (n.includes('рис')) return '🍚';
  if (n.includes('курица')||n.includes('chicken')) return '🍗';
  if (n.includes('рыб')||n.includes('лосось')) return '🐟';
  if (n.includes('пицц')) return '🍕';
  if (n.includes('бургер')||n.includes('сэндвич')) return '🍔';
  if (n.includes('паст')||n.includes('макарон')) return '🍝';
  if (n.includes('гречк')) return '🌾';
  if (n.includes('овощ')||n.includes('брокколи')) return '🥦';
  if (n.includes('фрукт')||n.includes('яблок')) return '🍎';
  if (n.includes('творог')||n.includes('йогурт')) return '🥛';
  if (n.includes('хлеб')||n.includes('тост')) return '🍞';
  if (n.includes('шоколад')||n.includes('конфет')) return '🍫';
  return '🍽';
}

// ── Data ──────────────────────────────────────────────────────────────────────
async function loadSettings() {
  if (!userId) return null;
  const {data} = await sb.from('user_settings').select('*').eq('user_id',userId).single();
  return data;
}

async function loadMeals(start,end) {
  if (!userId) return [];
  const {data} = await sb.from('meals').select('*').eq('user_id',userId).gte('date',start).lte('date',end).order('date').order('time');
  return data||[];
}

async function loadWaterEntries(start,end) {
  if (!userId) return [];
  const {data} = await sb.from('water').select('*').eq('user_id',userId).gte('date',start).lte('date',end).order('date').order('time');
  return data||[];
}

async function loadBurned(start,end) {
  if (!userId) return 0;
  const {data} = await sb.from('burned').select('calories').eq('user_id',userId).gte('date',start).lte('date',end);
  return (data||[]).reduce((s,r)=>s+r.calories,0);
}

async function deleteMeal(id)  { await sb.from('meals').delete().eq('id',id); renderAll(); }
async function deleteWater(id) { await sb.from('water').delete().eq('id',id); renderAll(); }

async function updateMeal(id, food, calories, protein, fat, carbs) {
  await sb.from('meals').update({food,calories,protein:protein||0,fat:fat||0,carbs:carbs||0}).eq('id',id);
  renderAll();
}

async function addMeal(food, calories, protein, fat, carbs) {
  const now = new Date();
  await sb.from('meals').insert({
    user_id:userId, date:now.toISOString().split('T')[0],
    time:now.toTimeString().slice(0,5),
    food,calories,protein:protein||0,fat:fat||0,carbs:carbs||0
  });
  renderAll();
}

async function addWater(ml) {
  const now = new Date();
  await sb.from('water').insert({
    user_id:userId, date:now.toISOString().split('T')[0],
    time:now.toTimeString().slice(0,5), amount_ml:ml
  });
  renderAll();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderSummary(meals, waterEntries, burnedCal, settings) {
  const totalCal  = meals.reduce((s,m)=>s+m.calories,0);
  const waterMl   = waterEntries.reduce((s,w)=>s+w.amount_ml,0);
  const calGoal   = settings?.calories_goal||2000;
  const waterGoal = settings?.water_goal_ml||2500;
  const calPct    = Math.min(totalCal/calGoal,1);
  const waterPct  = Math.min(waterMl/waterGoal,1);

  document.getElementById('summaryRow').innerHTML = `
    <div class="summary-card">
      <div class="card-label">Калории</div>
      <div class="card-value">${totalCal}<span class="card-unit"> / ${calGoal}</span></div>
      <div class="card-bar"><div class="card-bar-fill" style="width:${calPct*100}%"></div></div>
    </div>
    <div class="summary-card">
      <div class="card-label">Вода</div>
      <div class="card-value">${waterMl}<span class="card-unit"> / ${waterGoal} мл</span></div>
      <div class="card-bar"><div class="card-bar-fill" style="width:${waterPct*100}%;background:linear-gradient(90deg,#4ef0ff,#7cffa4)"></div></div>
    </div>
    ${burnedCal ? `
    <div class="summary-card">
      <div class="card-label">Сожжено</div>
      <div class="card-value">${burnedCal}<span class="card-unit"> ккал</span></div>
    </div>
    <div class="summary-card">
      <div class="card-label">Баланс</div>
      <div class="card-value" style="color:${burnedCal-totalCal>0?'var(--accent)':'var(--danger)'}">
        ${burnedCal-totalCal>0?'+':''}${burnedCal-totalCal}
      </div>
    </div>` : ''}
  `;
}

function renderMealsContent(meals) {
  const content = document.getElementById('content');
  if (!meals.length) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">🍽</div><div class="empty-title">Пусто</div><div class="empty-sub">Нет записей за этот период</div></div>`;
    return;
  }

  function mealCard(m) {
    return `
      <div class="meal-card">
        <div class="meal-icon">${foodEmoji(m.food)}</div>
        <div class="meal-info">
          <div class="meal-name">${m.food}</div>
          <div class="meal-meta">${m.time} · 🔥${m.calories} · Б${(m.protein||0).toFixed(0)} Ж${(m.fat||0).toFixed(0)} У${(m.carbs||0).toFixed(0)}</div>
        </div>
        <div class="meal-actions">
          <button class="icon-btn edit" onclick="openEditMeal(${m.id},'${m.food.replace(/'/g,"\\'")}',${m.calories},${m.protein||0},${m.fat||0},${m.carbs||0})" title="Редактировать">✏️</button>
          <button class="icon-btn del" onclick="deleteMeal(${m.id})" title="Удалить">✕</button>
        </div>
      </div>`;
  }

  if (currentPeriod==='today') {
    content.innerHTML = `<div class="meals-list">${meals.map(mealCard).join('')}</div>`;
  } else {
    const byDay = {};
    meals.forEach(m => { if(!byDay[m.date]) byDay[m.date]=[]; byDay[m.date].push(m); });
    content.innerHTML = Object.entries(byDay).reverse().map(([date,dayMeals]) => {
      const total = dayMeals.reduce((s,m)=>s+m.calories,0);
      return `<div class="day-group">
        <div class="day-header"><div class="day-date">${fmtDate(date)}</div><div class="day-total">${total} ккал</div></div>
        <div class="meals-list">${dayMeals.map(mealCard).join('')}</div>
      </div>`;
    }).join('');
  }
}

function renderWaterContent(entries) {
  const content = document.getElementById('content');
  if (!entries.length) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">💧</div><div class="empty-title">Пусто</div><div class="empty-sub">Нет записей о воде</div></div>`;
    return;
  }

  function waterCard(w) {
    return `
      <div class="water-entry">
        <div class="water-icon">💧</div>
        <div class="water-info">
          <div class="water-ml">${w.amount_ml} мл</div>
          <div class="meal-meta">${w.time}</div>
        </div>
        <button class="icon-btn del" onclick="deleteWater(${w.id})" title="Удалить">✕</button>
      </div>`;
  }

  if (currentPeriod==='today') {
    content.innerHTML = `<div class="meals-list">${entries.map(waterCard).join('')}</div>`;
  } else {
    const byDay = {};
    entries.forEach(w => { if(!byDay[w.date]) byDay[w.date]=[]; byDay[w.date].push(w); });
    content.innerHTML = Object.entries(byDay).reverse().map(([date,dayEntries]) => {
      const total = dayEntries.reduce((s,w)=>s+w.amount_ml,0);
      return `<div class="day-group">
        <div class="day-header"><div class="day-date">${fmtDate(date)}</div><div class="day-total">${total} мл</div></div>
        <div class="meals-list">${dayEntries.map(waterCard).join('')}</div>
      </div>`;
    }).join('');
  }
}

async function renderAll() {
  const {start,end} = getPeriodDates();
  const [meals, waterEntries, burnedCal] = await Promise.all([
    loadMeals(start,end),
    loadWaterEntries(start,end),
    loadBurned(start,end),
  ]);
  renderSummary(meals, waterEntries, burnedCal, userSettings);
  if (currentSection==='meals') renderMealsContent(meals);
  else renderWaterContent(waterEntries);
}

// ── Edit meal modal ────────────────────────────────────────────────────────────
function openEditMeal(id, food, cal, p, f, c) {
  document.getElementById('mealModalTitle').textContent = 'Редактировать блюдо';
  document.getElementById('editMealId').value = id;
  document.getElementById('foodName').value = food;
  document.getElementById('foodCal').value  = cal;
  document.getElementById('foodP').value    = p;
  document.getElementById('foodF').value    = f;
  document.getElementById('foodC').value    = c;
  document.getElementById('mealModal').classList.add('open');
}

function setWaterMl(ml) { document.getElementById('waterMl').value = ml; }

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('ru',{day:'numeric',month:'long'});
  document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div></div>`;

  userSettings = await loadSettings();
  await renderAll();

  // Period tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', async () => {
      const period = tab.dataset.period;
      if (period==='custom') {
        const start = prompt('Начало (ГГГГ-ММ-ДД):');
        const end   = prompt('Конец (ГГГГ-ММ-ДД):');
        if (!start||!end) return;
        customStart=start; customEnd=end;
      }
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      currentPeriod = period;
      document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
      await renderAll();
    });
  });

  // Section tabs (Еда / Вода)
  document.querySelectorAll('.section-tab').forEach(tab => {
    tab.addEventListener('click', async () => {
      document.querySelectorAll('.section-tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      currentSection = tab.dataset.section;
      document.getElementById('sectionTitle').textContent = currentSection==='meals' ? 'Дневник' : 'Вода';
      document.getElementById('content').innerHTML = `<div class="loading"><div class="spinner"></div></div>`;
      await renderAll();
    });
  });

  // Add button
  document.getElementById('addBtn').addEventListener('click', () => {
    if (currentSection==='meals') {
      document.getElementById('mealModalTitle').textContent = 'Добавить блюдо';
      document.getElementById('editMealId').value = '';
      document.getElementById('foodName').value = '';
      document.getElementById('foodCal').value  = '';
      document.getElementById('foodP').value    = '';
      document.getElementById('foodF').value    = '';
      document.getElementById('foodC').value    = '';
      document.getElementById('mealModal').classList.add('open');
    } else {
      document.getElementById('waterMl').value = '';
      document.getElementById('waterModal').classList.add('open');
    }
  });

  // Close modals on overlay click
  ['mealModal','waterModal'].forEach(id => {
    document.getElementById(id).addEventListener('click', e => {
      if (e.target===e.currentTarget) document.getElementById(id).classList.remove('open');
    });
  });

  // Meal submit
  document.getElementById('mealSubmitBtn').addEventListener('click', async () => {
    const food = document.getElementById('foodName').value.trim();
    const cal  = parseInt(document.getElementById('foodCal').value);
    const p    = parseFloat(document.getElementById('foodP').value)||0;
    const f    = parseFloat(document.getElementById('foodF').value)||0;
    const c    = parseFloat(document.getElementById('foodC').value)||0;
    if (!food||!cal) { alert('Заполни название и калории'); return; }

    const editId = document.getElementById('editMealId').value;
    document.getElementById('mealSubmitBtn').textContent = 'Сохраняю...';

    if (editId) {
      await updateMeal(parseInt(editId), food, cal, p, f, c);
    } else {
      await addMeal(food, cal, p, f, c);
    }

    document.getElementById('mealModal').classList.remove('open');
    document.getElementById('mealSubmitBtn').textContent = 'Сохранить';
  });

  // Water submit
  document.getElementById('waterSubmitBtn').addEventListener('click', async () => {
    const ml = parseInt(document.getElementById('waterMl').value);
    if (!ml||ml<1) { alert('Введи количество мл'); return; }
    document.getElementById('waterSubmitBtn').textContent = 'Сохраняю...';
    await addWater(ml);
    document.getElementById('waterModal').classList.remove('open');
    document.getElementById('waterSubmitBtn').textContent = 'Сохранить';
  });
}

init();

// ── Reminders UI / Profile UI ─────────────────────────────────────────────

let selectedWaterInterval = 2;

function setWaterInterval(n) {
  selectedWaterInterval = n;
  document.querySelectorAll('[data-interval]').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.interval, 10) === n);
  });
}

function openProfile() {
  if (!userSettings) {
    alert('Профиль ещё загружается');
    return;
  }

  document.getElementById('profileUserId').textContent = userId || '—';
  document.getElementById('profileGender').textContent = userSettings.gender || '—';
  document.getElementById('profileAge').textContent = userSettings.age || '—';
  document.getElementById('profileWeight').textContent = userSettings.weight_kg ? `${userSettings.weight_kg} кг` : '—';
  document.getElementById('profileHeight').textContent = userSettings.height_cm ? `${userSettings.height_cm} см` : '—';
  document.getElementById('profileActivity').textContent = userSettings.activity || '—';
  document.getElementById('profileGoal').textContent = userSettings.goal || '—';
  document.getElementById('profileCaloriesGoal').textContent = userSettings.calories_goal ? `${userSettings.calories_goal} ккал` : '—';
  document.getElementById('profileCaloriesDeficit').textContent = userSettings.calories_deficit ? `${userSettings.calories_deficit} ккал` : '—';
  document.getElementById('profileCaloriesMaintenance').textContent = userSettings.calories_maintenance ? `${userSettings.calories_maintenance} ккал` : '—';
  document.getElementById('profileWaterGoal').textContent = userSettings.water_goal_ml ? `${userSettings.water_goal_ml} мл` : '—';

  document.getElementById('profileModal').classList.add('open');
}

async function openReminders() {
  if (!userSettings) {
    alert('Настройки ещё загружаются');
    return;
  }

  document.getElementById('remBreakfastOn').checked = !!userSettings.remind_breakfast_enabled;
  document.getElementById('remBreakfastTime').value = userSettings.remind_breakfast_time || '09:00';
  document.getElementById('remLunchOn').checked = !!userSettings.remind_lunch_enabled;
  document.getElementById('remLunchTime').value = userSettings.remind_lunch_time || '13:00';
  document.getElementById('remDinnerOn').checked = !!userSettings.remind_dinner_enabled;
  document.getElementById('remDinnerTime').value = userSettings.remind_dinner_time || '19:00';
  document.getElementById('remWaterOn').checked = !!userSettings.remind_water_enabled;
  selectedWaterInterval = userSettings.remind_water_interval || 2;
  document.getElementById('remWaterIntervalRow').style.display = userSettings.remind_water_enabled ? 'block' : 'none';
  setWaterInterval(selectedWaterInterval);
  document.getElementById('remindersModal').classList.add('open');
}

function bindProfileAndReminderHandlers() {
  const profileBtn = document.getElementById('profileBtn');
  if (profileBtn) profileBtn.addEventListener('click', openProfile);

  const remindersBtn = document.getElementById('remindersBtn');
  if (remindersBtn) remindersBtn.addEventListener('click', openReminders);

  const profileModal = document.getElementById('profileModal');
  if (profileModal) {
    profileModal.addEventListener('click', e => {
      if (e.target === e.currentTarget) profileModal.classList.remove('open');
    });
  }

  const remindersModal = document.getElementById('remindersModal');
  if (remindersModal) {
    remindersModal.addEventListener('click', e => {
      if (e.target === e.currentTarget) remindersModal.classList.remove('open');
    });
  }

  const profileCloseBtn = document.getElementById('profileCloseBtn');
  if (profileCloseBtn) {
    profileCloseBtn.addEventListener('click', () => {
      document.getElementById('profileModal').classList.remove('open');
    });
  }

  const remWaterOn = document.getElementById('remWaterOn');
  if (remWaterOn) {
    remWaterOn.addEventListener('change', function() {
      document.getElementById('remWaterIntervalRow').style.display = this.checked ? 'block' : 'none';
    });
  }

  const remindersSaveBtn = document.getElementById('remindersSaveBtn');
  if (remindersSaveBtn) {
    remindersSaveBtn.addEventListener('click', async () => {
      if (!userId) {
        alert('Не удалось определить пользователя Telegram');
        return;
      }

      const updates = {
        remind_breakfast_enabled: document.getElementById('remBreakfastOn').checked ? 1 : 0,
        remind_breakfast_time: document.getElementById('remBreakfastTime').value,
        remind_lunch_enabled: document.getElementById('remLunchOn').checked ? 1 : 0,
        remind_lunch_time: document.getElementById('remLunchTime').value,
        remind_dinner_enabled: document.getElementById('remDinnerOn').checked ? 1 : 0,
        remind_dinner_time: document.getElementById('remDinnerTime').value,
        remind_water_enabled: document.getElementById('remWaterOn').checked ? 1 : 0,
        remind_water_interval: selectedWaterInterval,
      };

      const btn = document.getElementById('remindersSaveBtn');
      btn.textContent = 'Сохраняю...';
      btn.disabled = true;

      try {
        const { error } = await sb.from('user_settings').update(updates).eq('user_id', userId);
        if (error) {
          console.error('save reminders error:', error);
          alert('Не удалось сохранить напоминания');
          return;
        }

        if (!userSettings) userSettings = {};
        Object.assign(userSettings, updates);
        document.getElementById('remindersModal').classList.remove('open');
      } finally {
        btn.textContent = 'Сохранить';
        btn.disabled = false;
      }
    });
  }
}

bindProfileAndReminderHandlers();


</script>
